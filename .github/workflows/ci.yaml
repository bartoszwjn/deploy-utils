name: CI

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail -- {0}

jobs:
  nix-checks:
    name: Nix checks - ${{ matrix.os.nix_system }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - { runner: ubuntu-24.04, nix_system: x86_64-linux }
          - { runner: ubuntu-24.04-arm, nix_system: aarch64-linux }
          - { runner: macos-26, nix_system: aarch64-darwin }
    runs-on: ${{ matrix.os.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            allow-import-from-derivation = false
            keep-derivations = true
            keep-outputs = true

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ matrix.os.nix_system }}-${{ hashFiles('flake.lock', 'rust-toolchain.toml') }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-prefixes-first-match: |
            nix-${{ matrix.os.nix_system }}-${{ hashFiles('flake.lock', 'rust-toolchain.toml') }}-
            nix-${{ matrix.os.nix_system }}-
          gc-max-store-size: 0

      - name: Run nix checks
        run: |
          # Build all check outputs of the flake, just like `nix flake check`,
          # but also create gc roots.
          system=$(nix eval --impure --raw --expr builtins.currentSystem)
          nix eval --no-update-lock-file --json \
              .#.checks.${system} \
              --apply 'checks: map (check: check.drvPath + "^*") (builtins.attrValues checks)' \
            | jq --raw-output '.[]' \
            | xargs nix build --no-update-lock-file --keep-going --print-build-logs \
                --out-link .gc-roots/check

      - name: Save flake inputs
        run: |
          # Create gc roots pointing to flake inputs.
          nix flake archive --no-update-lock-file --json \
            | jq --raw-output 'recurse(.inputs[]) | .path' \
            | xargs nix build --no-update-lock-file --keep-going --print-build-logs \
                --out-link .gc-roots/input
